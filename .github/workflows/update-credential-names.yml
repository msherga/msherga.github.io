name: Update credential names

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  update:
    if: github.event.head_commit.message == 'Add one-time credential name updater'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update credential titles and descriptions
        shell: python
        run: |
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          replacements = {
              "<h3>Professional digital badge</h3>": "<h3>Dell EMC Information Storage and Management v3</h3>",
              "<p>The embedded badge is served directly by Credly and links to the official public verification record.</p>": "<p>Verified Dell EMC Information Storage and Management v3 credential, with the official badge served directly by Credly.</p>",
              "<h3>Microsoft credential</h3>": "<h3>Microsoft Certified: Azure Fundamentals (AZ-900)</h3>",
              "<p>Open the official Microsoft Learn record to view the credential name, achievement details, and validation information.</p>": "<p>Verified Microsoft Azure Fundamentals credential earned through exam AZ-900, linked to the official Microsoft Learn record.</p>",
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Expected text not found: {old}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Name portfolio credentials"
          git push

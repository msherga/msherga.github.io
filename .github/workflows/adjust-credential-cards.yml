name: Adjust credential card layout

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  update:
    if: github.event.head_commit.message == 'Add one-time credential card layout fix'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Improve credential display
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old = '''    .credential-card {
      position: relative;
      min-height: 330px;
      display: grid;
      grid-template-columns: minmax(160px, 0.72fr) minmax(0, 1.28fr);
      gap: 28px;
      align-items: center;
      padding: 30px;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 16%, rgba(89, 216, 255, 0.1), transparent 15rem),
        linear-gradient(145deg, rgba(15, 33, 55, 0.94), rgba(9, 23, 39, 0.9));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.16);
      transition: transform 180ms ease, border-color 180ms ease;
    }'''
          new = '''    .credential-card {
      position: relative;
      min-height: 610px;
      display: flex;
      flex-direction: column;
      gap: 26px;
      padding: 30px;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 16%, rgba(89, 216, 255, 0.1), transparent 15rem),
        linear-gradient(145deg, rgba(15, 33, 55, 0.94), rgba(9, 23, 39, 0.9));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.16);
      transition: transform 180ms ease, border-color 180ms ease;
    }'''
          if old not in text:
              raise SystemExit('credential-card block not found')
          text = text.replace(old, new, 1)

          old = '''    .credential-visual {
      min-height: 270px;
      display: grid;
      place-items: center;
      padding: 12px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .credential-visual > div[data-share-badge-id] {
      min-height: 270px;
    }'''
          new = '''    .credential-visual {
      min-height: 340px;
      display: grid;
      place-items: center;
      padding: 20px;
      overflow: hidden;
      color: #172033;
      background: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 18px;
      box-shadow: inset 0 0 0 1px rgba(7, 16, 29, 0.08);
    }

    .credential-visual > div[data-share-badge-id] {
      width: 100%;
      min-height: 300px;
      display: grid;
      place-items: center;
    }

    .credential-visual iframe {
      max-width: 100% !important;
    }'''
          if old not in text:
              raise SystemExit('credential-visual block not found')
          text = text.replace(old, new, 1)

          old = '''    .credential-copy {
      display: flex;
      min-width: 0;
      flex-direction: column;
      align-self: stretch;
      justify-content: center;
    }'''
          new = '''    .credential-copy {
      display: flex;
      min-width: 0;
      flex: 1;
      flex-direction: column;
      align-self: stretch;
      justify-content: flex-start;
    }'''
          if old not in text:
              raise SystemExit('credential-copy block not found')
          text = text.replace(old, new, 1)

          text = text.replace('data-iframe-width="150" data-iframe-height="270"', 'data-iframe-width="300" data-iframe-height="300"', 1)

          old = '''      .credential-card {
        grid-template-columns: 1fr;
        gap: 22px;
        padding: 22px;
      }

      .credential-visual {
        min-height: 220px;
      }

      .credential-visual > div[data-share-badge-id] {
        min-height: 270px;
      }'''
          new = '''      .credential-card {
        min-height: 0;
        gap: 22px;
        padding: 22px;
      }

      .credential-visual {
        min-height: 320px;
        padding: 14px;
      }

      .credential-visual > div[data-share-badge-id] {
        min-height: 300px;
      }'''
          if old not in text:
              raise SystemExit('mobile credential block not found')
          text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')

      - name: Commit update and remove workflow
        shell: bash
        run: |
          rm .github/workflows/adjust-credential-cards.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/adjust-credential-cards.yml
          git commit -m "Improve credential badge readability"
          git push

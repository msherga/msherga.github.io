name: Deploy Shiny app

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SHINYAPPS_ACCOUNT: msherga
      SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
      SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 3
          extra-packages: |
            any::shiny
            any::rsconnect
            any::dplyr
            any::ggplot2
            any::cpp11
            any::isoband
          needs: |
            website

      - name: Verify required packages
        shell: bash
        run: |
          Rscript -e 'stopifnot(requireNamespace("rsconnect", quietly = TRUE), requireNamespace("shiny", quietly = TRUE), requireNamespace("dplyr", quietly = TRUE), requireNamespace("ggplot2", quietly = TRUE), requireNamespace("cpp11", quietly = TRUE), requireNamespace("isoband", quietly = TRUE))'

      - name: Configure shinyapps.io account
        shell: bash
        run: |
          Rscript -e 'rsconnect::setAccountInfo(name = Sys.getenv("SHINYAPPS_ACCOUNT"), token = Sys.getenv("SHINYAPPS_TOKEN"), secret = Sys.getenv("SHINYAPPS_SECRET"))'

      - name: Deploy BB_Study
        shell: bash
        run: |
          Rscript -e 'rsconnect::deployApp(appDir = "BB_Study", appName = "BB_Study", account = Sys.getenv("SHINYAPPS_ACCOUNT"), forceUpdate = TRUE, launch.browser = FALSE)'
